# This workflow runs local unit tests and external-node integration tests on PRs
name: tests
on:
  pull_request:
    paths:
      - "**/*.py"
      - "requirements.txt"
      - "dev-requirements.txt"
      - "setup.cfg"
      - "pyproject.toml"
      - ".github/workflows/test.yml"
      - "test.sh"
      - "tests/**"

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run local unit tests
        run: >
          python -m pytest -q -m "not integration"
          --cov=sesam_cli --cov=connector_cli
          --cov-report=term-missing
          --cov-fail-under=20
          tests/unit

  integration:
    name: Integration tests
    if: ${{ secrets.SESAM_CI_TOKEN != '' }}
    runs-on: ${{ matrix.os }}
    concurrency: sesam_py_environment
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
        python: ["3.10"]
      # The tests for each OS talk to the same CI node (called Sesam client CI test node)
      # So if they run at the same time they will mess each other up
      # Ideally we would let them do the install step in parallel and only
      # do the test step sequentially
      max-parallel: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Echo information
        run:  |
          echo ${{matrix.os}}
          python --version
      - name: Allow running of install scripts
        env:
          OS: ${{ matrix.os }}
        run: |
          chmod +x install.sh
          chmod +x test.sh
      - name: Run install script
        env:
          OS: ${{ matrix.os }}
        run: bash install.sh
      - name: Run test script
        env:
          OS: ${{ matrix.os }}
          SESAM_TOKEN: ${{ secrets.SESAM_CI_TOKEN }}
        run: bash test.sh
      - name: Run pytest integration tests
        run: python -m pytest -q -m integration tests/fair_weather_test/tests
