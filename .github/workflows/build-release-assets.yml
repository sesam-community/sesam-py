# This workflow builds and uploads the assets when a new release is created
name: Build release assets
on:
  release:
    types:
      - published
jobs:
  build-and-upload:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-22.04, windows-latest]
        python: ["3.10"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Echo information
        run:  |
          echo ${{matrix.os}}
          python --version
      - name: Allow running of install script
        env:
          OS: ${{ matrix.os }}
        run: |
          chmod +x install.sh
      - name: Run install script
        env:
          OS: ${{ matrix.os }}
        run: bash install.sh
      - name: Package assets
        env:
          OS: ${{ matrix.os }}
          TAG: ${{ github.event.release.tag_name }}
        run: bash package.sh
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            gh release upload "$TAG" "dist/sesam-windows-${TAG}.zip" --clobber
          elif [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            gh release upload "$TAG" "dist/sesam-linux-${TAG}.tar.gz" --clobber
          else
            cp "dist/sesam-macos-${TAG}.tar.gz" "dist/sesam-osx-${TAG}.tar.gz"
            gh release upload "$TAG" "dist/sesam-osx-${TAG}.tar.gz" --clobber
          fi
